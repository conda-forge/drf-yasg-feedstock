{% set name = "drf-yasg" %}
{% set version = "1.21.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 0190b3de884aa593a39c75e6daba2ae69f285f0691de1eb0e3f4c6307faa1817

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.6,<=3.12
    - setuptools >=68.0.0
    - wheel
    - setuptools-scm >=3.0.3
    - pip
  run:
    - python >=3.6,<=3.12
    - djangorestframework >=3.10.3,<=3.14
    - django >=2.2.16,<=4.2
    - pyyaml >=5.1
    - inflection >=0.3.1
    - packaging >=21.0
    - pytz >=2021.1
    - uritemplate >=3.0.0

test:
  imports:
    - drf_yasg
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/axnsan12/drf-yasg
  summary: Automated generation of real Swagger/OpenAPI 2.0 schemas from Django Rest Framework code.
  license: BSD-3-Clause
  license_file:
    - LICENSE.rst


extra:
  recipe-maintainers:
    - julian-belina
