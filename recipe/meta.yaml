{% set name = "drf-yasg" %}
{% set version = "1.21.15" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: ef86838c4ef10dcd3ac1ebf2be601cbe02978b999671caa43667f7c9db961468

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=68.0.0
    - wheel
    - setuptools-scm >=3.0.3
    - pip
  run:
    - python >={{ python_min }}
    - djangorestframework >=3.13
    - django >=4.0
    - pyyaml >=5.1
    - inflection >=0.3.1
    - packaging >=21.0
    - pytz >=2021.1
    - uritemplate >=3.0.0

test:
  imports:
    - drf_yasg
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/axnsan12/drf-yasg
  summary: Automated generation of real Swagger/OpenAPI 2.0 schemas from Django Rest Framework code.
  license: BSD-3-Clause
  license_file:
    - LICENSE.rst


extra:
  recipe-maintainers:
    - julian-belina
